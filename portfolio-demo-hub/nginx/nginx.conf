server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /demo/ai-site-consultant/ {
        proxy_pass http://ai_site_consultant:8000/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /admin-demo/ai-site-consultant/ {
        proxy_pass http://ai_site_consultant:8000/admin;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/ai-site-consultant/ {
        proxy_pass http://ai_site_consultant:8000/admin/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /demo/smart-lead-form/ {
        proxy_pass http://smart_lead_form:8000/widget/index.html;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /demo/smart-lead-form/health {
        proxy_pass http://smart_lead_form:8000/api/health;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/api/ {
        proxy_pass http://smart_lead_form:8000/api/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/demo-session/ {
        proxy_pass http://smart_lead_form:8000/demo-session/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/ {
        proxy_pass http://smart_lead_form:8000/widget/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /admin-demo/smart-lead-form/ {
        proxy_pass http://smart_lead_form:8000/widget/admin.html;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/smart-lead-form/api/ {
        proxy_pass http://smart_lead_form:8000/api/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/smart-lead-form/ {
        proxy_pass http://smart_lead_form:8000/widget/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /project-assets/ {
        alias /projects/;
        autoindex off;
    }

    location / {
        proxy_pass http://portfolio_hub:8000;
        proxy_redirect off;
    }
}
