# Nginx is the public entrypoint for the whole monorepo.
# It keeps the Hub, both demo projects, admin panels, and project assets under one origin.
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $portfolio_hub http://portfolio_hub:8000;
    set $ai_site_consultant http://ai_site_consultant:8000;
    set $smart_lead_form http://smart_lead_form:8000;

    location = /favicon.ico {
        # Serve the real site favicon from Portfolio Hub.
        proxy_pass $portfolio_hub/favicon.ico;
        proxy_redirect off;
    }

    location = /demo/ai-site-consultant/ {
        # AI Chat demo root page. sub_filter rewrites standalone asset paths for nested /demo/... route.
        proxy_pass $ai_site_consultant/;
        proxy_redirect off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter 'href="/static/' 'href="/demo/ai-site-consultant/static/';
        sub_filter 'src="/static/' 'src="/demo/ai-site-consultant/static/';
        sub_filter 'src="/widget/' 'src="/demo/ai-site-consultant/widget/';
        sub_filter 'href="/widget/' 'href="/demo/ai-site-consultant/widget/';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /demo/ai-site-consultant/health {
        proxy_pass $ai_site_consultant/health;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/ai-site-consultant/api/ {
        proxy_pass $ai_site_consultant/api/;
        proxy_redirect off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/ai-site-consultant/static/ {
        proxy_pass $ai_site_consultant/static/;
        proxy_redirect off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types text/css application/javascript;
        sub_filter '/static/' '/demo/ai-site-consultant/static/';
        sub_filter '"/static/' '"/demo/ai-site-consultant/static/';
        sub_filter "('/static/" "('/demo/ai-site-consultant/static/";
        sub_filter 'http://127.0.0.1:8000' '/demo/ai-site-consultant';
        sub_filter 'http://localhost:8000' '/demo/ai-site-consultant';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/ai-site-consultant/widget/ {
        proxy_pass $ai_site_consultant/widget/;
        proxy_redirect off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/javascript;
        sub_filter 'new URL(widgetScript.src, document.baseURI).origin' 'new URL(widgetScript.src, document.baseURI).origin + "/demo/ai-site-consultant"';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/ai-site-consultant/ {
        proxy_pass $ai_site_consultant/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/ai-site-consultant/static/ {
        proxy_pass $ai_site_consultant/static/;
        proxy_redirect off;
        proxy_set_header X-Demo-Admin "true";
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/javascript text/css;
        sub_filter 'fetch("/admin' 'fetch("/admin-demo/ai-site-consultant';
        sub_filter 'href="/admin' 'href="/admin-demo/ai-site-consultant';
        sub_filter 'action="/admin' 'action="/admin-demo/ai-site-consultant';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /admin-demo/ai-site-consultant/ {
        # Public admin entry. X-Demo-Admin lets the app require a demo_session_id scope.
        proxy_pass $ai_site_consultant/admin;
        proxy_redirect /admin/ /admin-demo/ai-site-consultant/;
        proxy_redirect /admin /admin-demo/ai-site-consultant/;
        proxy_set_header X-Demo-Admin "true";
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/javascript;
        sub_filter 'href="/admin' 'href="/admin-demo/ai-site-consultant';
        sub_filter 'action="/admin' 'action="/admin-demo/ai-site-consultant';
        sub_filter 'fetch("/admin' 'fetch("/admin-demo/ai-site-consultant';
        sub_filter 'href="/static' 'href="/admin-demo/ai-site-consultant/static';
        sub_filter 'src="/static' 'src="/admin-demo/ai-site-consultant/static';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/ai-site-consultant/ {
        proxy_pass $ai_site_consultant/admin/;
        proxy_redirect /admin/ /admin-demo/ai-site-consultant/;
        proxy_redirect /admin /admin-demo/ai-site-consultant/;
        proxy_set_header X-Demo-Admin "true";
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter_types application/javascript;
        sub_filter 'href="/admin' 'href="/admin-demo/ai-site-consultant';
        sub_filter 'action="/admin' 'action="/admin-demo/ai-site-consultant';
        sub_filter 'fetch("/admin' 'fetch("/admin-demo/ai-site-consultant';
        sub_filter 'href="/static' 'href="/admin-demo/ai-site-consultant/static';
        sub_filter 'src="/static' 'src="/admin-demo/ai-site-consultant/static';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /demo/smart-lead-form/ {
        # Smart Lead Form public widget entry.
        proxy_pass $smart_lead_form/widget/index.html;
        proxy_redirect off;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter 'apiBaseUrl: "http://localhost:8000"' 'apiBaseUrl: "/demo/smart-lead-form"';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /demo/smart-lead-form/health {
        proxy_pass $smart_lead_form/api/health;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/api/ {
        proxy_pass $smart_lead_form/api/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/demo-session/ {
        proxy_pass $smart_lead_form/demo-session/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/widget/ {
        proxy_pass $smart_lead_form/widget/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /demo/smart-lead-form/ {
        proxy_pass $smart_lead_form/widget/;
        proxy_redirect off;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location = /admin-demo/smart-lead-form/ {
        # Smart Lead Form admin entry. Frontend and API are still scoped by demo_session_id.
        proxy_pass $smart_lead_form/widget/admin.html;
        proxy_redirect off;
        proxy_set_header X-Demo-Admin "true";
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter 'apiBaseUrl: "http://localhost:8000"' 'apiBaseUrl: "/admin-demo/smart-lead-form"';
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/smart-lead-form/api/ {
        proxy_pass $smart_lead_form/api/;
        proxy_redirect off;
        proxy_set_header X-Demo-Admin "true";
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/smart-lead-form/widget/ {
        proxy_pass $smart_lead_form/widget/;
        proxy_redirect off;
        proxy_set_header X-Demo-Admin "true";
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /admin-demo/smart-lead-form/ {
        proxy_pass $smart_lead_form/widget/;
        proxy_redirect off;
        proxy_set_header X-Demo-Admin "true";
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    location /project-assets/ {
        # Static media from projects/*: previews, videos, screenshots.
        alias /projects/;
        autoindex off;
    }

    location / {
        # Everything else belongs to Portfolio Hub.
        proxy_pass $portfolio_hub;
        proxy_redirect off;
    }
}
