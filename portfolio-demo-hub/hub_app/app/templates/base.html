<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI-автоматизация для бизнеса — Maxim AI Automation{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}AI-консультанты, умные формы заявок, WhatsApp-боты и automation-решения для малого бизнеса.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}AI-автоматизация для бизнеса — Maxim AI Automation{% endblock %}">
  <meta property="og:description" content="{% block og_description %}AI-консультанты, умные формы заявок, WhatsApp-боты и automation-решения для малого бизнеса.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}/project-assets/ai_site_consultant/preview.png{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/static/css/styles.css">
  {% block head %}{% endblock %}
</head>
<body data-project-id="{{ project.id if project is defined else '' }}">
  <header class="site-header">
    <a class="brand" href="/" aria-label="Maxim AI Automation">
      <span class="brand-mark">M</span>
      <span>Maxim AI Automation</span>
    </a>
    <nav class="main-nav" aria-label="Основная навигация">
      <a href="/">Главная</a>
      <a href="/projects">Проекты</a>
      <a href="/for-partners">Для партнеров</a>
      <a href="/contact" data-track-event="contact_button_click">Связаться</a>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/analytics.js"></script>
  <script src="/static/js/reveal.js"></script>
  <script src="/static/js/typing.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
