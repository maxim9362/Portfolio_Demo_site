{# Shared admin layout: protected navigation, admin styles, and common page frame. #}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portfolio Admin{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="admin-body">
  <header class="site-header admin-header">
    <a class="brand" href="/admin">
      <span class="brand-mark">H</span>
      <span>Portfolio Hub</span>
    </a>
    <nav class="main-nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/leads">Заявки</a>
      <a href="/admin/sessions">Сессии</a>
      <a href="/admin/analytics">Аналитика</a>
      <a href="/admin/demo-sessions">Демо</a>
      <a href="/admin/projects">Проекты</a>
      <a href="/">Сайт</a>
    </nav>
  </header>
  <main class="page admin-page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
