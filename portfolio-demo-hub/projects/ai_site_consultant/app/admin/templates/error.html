<!-- Этот шаблон показывает понятную ошибку административного действия. -->
{% extends "base.html" %}
{% block title %}Ошибка{% endblock %}
{% block content %}
<section class="error-state">
    <span class="eyebrow">Не удалось выполнить действие</span>
    <h1>{{ error }}</h1>
    <a class="button button--primary" href="/admin">Вернуться в админку</a>
</section>
{% endblock %}
