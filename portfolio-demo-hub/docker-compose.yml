services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 20

  portfolio_hub:
    build:
      context: ./hub_app
    env_file:
      - .env
    volumes:
      - ./projects:/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  ai_site_consultant:
    build:
      context: ./projects/ai_site_consultant
    env_file:
      - ./projects/ai_site_consultant/.env
    expose:
      - "8000"

  smart_lead_form:
    build:
      context: ./projects/smart_lead_form
    env_file:
      - ./projects/smart_lead_form/.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./projects:/projects:ro
    depends_on:
      - portfolio_hub
      - ai_site_consultant
      - smart_lead_form

volumes:
  postgres_data:
