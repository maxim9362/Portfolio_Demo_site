services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-portfolio} -d $${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 20

  portfolio_hub:
    build:
      context: ./hub_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-portfolio}
      DEMO_INTERNAL_BASE_URL: ${DEMO_INTERNAL_BASE_URL:-http://nginx}
    volumes:
      - ./projects:/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  ai_site_consultant_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AI_SITE_CONSULTANT_POSTGRES_DB:-ai_consultant}
      POSTGRES_USER: ${AI_SITE_CONSULTANT_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${AI_SITE_CONSULTANT_POSTGRES_PASSWORD:-change_me}
    volumes:
      - ai_site_consultant_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ai_consultant}"]
      interval: 10s
      timeout: 5s
      retries: 20

  ai_site_consultant:
    build:
      context: ./projects/ai_site_consultant
    restart: unless-stopped
    env_file:
      - ./projects/ai_site_consultant/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${AI_SITE_CONSULTANT_POSTGRES_USER:-postgres}:${AI_SITE_CONSULTANT_POSTGRES_PASSWORD:-change_me}@ai_site_consultant_postgres:5432/${AI_SITE_CONSULTANT_POSTGRES_DB:-ai_consultant}
      KNOWLEDGE_DIR: /app/knowledge
      CHROMA_PATH: /app/chroma_data
    volumes:
      - ai_site_consultant_chroma_data:/app/chroma_data
    depends_on:
      ai_site_consultant_postgres:
        condition: service_healthy
    expose:
      - "8000"

  smart_lead_form_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SMART_LEAD_FORM_POSTGRES_DB:-smart_lead_form}
      POSTGRES_USER: ${SMART_LEAD_FORM_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SMART_LEAD_FORM_POSTGRES_PASSWORD:-change_me}
    volumes:
      - smart_lead_form_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-smart_lead_form}"]
      interval: 10s
      timeout: 5s
      retries: 20

  smart_lead_form:
    build:
      context: ./projects/smart_lead_form
    restart: unless-stopped
    env_file:
      - ./projects/smart_lead_form/.env
    environment:
      DATABASE_URL: postgresql://${SMART_LEAD_FORM_POSTGRES_USER:-postgres}:${SMART_LEAD_FORM_POSTGRES_PASSWORD:-change_me}@smart_lead_form_postgres:5432/${SMART_LEAD_FORM_POSTGRES_DB:-smart_lead_form}
      PUBLIC_BASE_URL: ${SITE_URL:-https://your-domain.com}/demo/smart-lead-form
    depends_on:
      smart_lead_form_postgres:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./projects:/projects:ro
    depends_on:
      - portfolio_hub
      - ai_site_consultant
      - smart_lead_form

volumes:
  postgres_data:
  ai_site_consultant_postgres_data:
  ai_site_consultant_chroma_data:
  smart_lead_form_postgres_data:
